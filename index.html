<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Registrar Equipo - Distribuciones Universal</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --primary: #0066cc;
      --primary-light: #00a3ff;
      --primary-dark: #004499;
      --bg: #f5f7fa;
      --surface: #ffffff;
      --surface-alt: #f9fafb;
      --border: #e5e7eb;
      --text: #1a202c;
      --text-muted: #64748b;
      --success: #10b981;
      --error: #ef4444;
      --shadow: 0 4px 12px rgba(0, 102, 204, 0.08);
    }
    
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, var(--bg) 0%, #e8ecf1 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    
    .container {
      width: 100%;
      max-width: 500px;
    }
    
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2.5rem;
      box-shadow: var(--shadow);
      animation: slideUp 0.6s ease;
    }
    
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    
    .logo-icon {
      width: 50px;
      height: 50px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 1.3rem;
      margin: 0 auto 1rem;
      box-shadow: 0 4px 12px rgba(0, 102, 204, 0.2);
    }
    
    .logo-name {
      font-family: 'Poppins', sans-serif;
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--primary-dark);
      margin-bottom: 0.5rem;
    }
    
    .subtitle {
      font-size: 0.95rem;
      color: var(--text-muted);
      margin-top: 0.5rem;
    }
    
    .form-group {
      margin-bottom: 1.5rem;
    }
    
    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    
    input, select, textarea {
      width: 100%;
      background: var(--surface-alt);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 0.9rem 1rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      transition: all 0.3s ease;
    }
    
    input:focus, select:focus, textarea:focus {
      border-color: var(--primary);
      background: #f0f7ff;
      box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.1);
      outline: none;
    }
    
    textarea {
      resize: vertical;
      min-height: 90px;
    }
    
    .button {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.95rem;
      letter-spacing: 0.3px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 1rem;
      box-shadow: 0 4px 12px rgba(0, 102, 204, 0.2);
    }
    
    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 102, 204, 0.3);
    }
    
    .button:active {
      transform: translateY(0);
    }
    
    .button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2.5px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .alert {
      padding: 1.2rem;
      border-radius: 8px;
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
      display: none;
      animation: slideDown 0.4s ease;
      border-left: 4px solid;
      line-height: 1.6;
    }
    
    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .alert.show {
      display: block;
    }
    
    .alert-success {
      background: rgba(16, 185, 129, 0.08);
      border-color: var(--success);
      color: var(--success);
    }
    
    .alert-error {
      background: rgba(239, 68, 68, 0.08);
      border-color: var(--error);
      color: var(--error);
    }
    
    .required {
      color: var(--error);
    }
    
    .form-info {
      background: rgba(0, 102, 204, 0.05);
      border-left: 3px solid var(--primary);
      padding: 1rem;
      border-radius: 6px;
      margin-bottom: 1.5rem;
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    
    @media (max-width: 600px) {
      .card {
        padding: 2rem;
      }
      
      .logo-name {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <!-- HEADER -->
      <div class="header">
        <div class="logo-icon">DU</div>
        <div class="logo-name">Distribuciones Universal</div>
        <div class="subtitle">Registrar Nuevo Equipo</div>
      </div>
      
      <!-- ALERTS -->
      <div id="successMsg" class="alert alert-success"></div>
      <div id="errorMsg" class="alert alert-error"></div>
      
      <!-- INFO BOX -->
      <div class="form-info">
        ℹ️ Completa todos los campos obligatorios marcados con <span class="required">*</span>
      </div>
      
      <!-- FORMULARIO -->
      <form id="registroForm" novalidate>
        <div class="form-group">
          <label>Código del Equipo <span class="required">*</span></label>
          <input type="text" id="codigo" placeholder="Ej: PC-001, LAPTOP-005" required>
        </div>
        
        <div class="form-group">
          <label>Descripción del Equipo <span class="required">*</span></label>
          <input type="text" id="descripcion" placeholder="Ej: Dell OptiPlex 7090, Intel i7, 16GB RAM" required>
        </div>
        
        <div class="form-group">
          <label>Ubicación <span class="required">*</span></label>
          <input type="text" id="ubicacion" placeholder="Ej: Oficina 1, Escritorio A" required>
        </div>
        
        <div class="form-group">
          <label>Usuario Asignado</label>
          <input type="text" id="usuario" placeholder="Nombre del usuario (opcional)">
        </div>
        
        <div class="form-group">
          <label>Estado del Equipo <span class="required">*</span></label>
          <select id="estado" required>
            <option value="">-- Seleccionar Estado --</option>
            <option value="activo">✓ Activo</option>
            <option value="problema">⚠ Problema Reportado</option>
            <option value="reparacion">🔧 En Reparación</option>
            <option value="inactivo">✗ Inactivo</option>
          </select>
        </div>
        
        <div class="form-group">
          <label>Descripción del Problema (si aplica)</label>
          <textarea id="problema" placeholder="Describe el problema, síntomas o incidencia reportada..."></textarea>
        </div>
        
        <button type="submit" class="button" id="submitBtn">✓ Registrar Equipo</button>
      </form>
    </div>
  </div>

  <script>
    // ===== CONFIGURACIÓN =====
    const SCRIPT_URL = 'https://script.google.com/macros/s/YOUR_SCRIPT_URL_HERE/usercontent'; // ← CAMBIAR CON TU URL
    
    const form = document.getElementById('registroForm');
    const submitBtn = document.getElementById('submitBtn');
    const errorMsg = document.getElementById('errorMsg');
    const successMsg = document.getElementById('successMsg');
    
    function showMessage(type, message) {
      const element = type === 'error' ? errorMsg : successMsg;
      const other = type === 'error' ? successMsg : errorMsg;
      
      element.textContent = message;
      element.classList.add('show');
      other.classList.remove('show');
      
      setTimeout(() => {
        element.classList.remove('show');
      }, 5000);
    }
    
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      // Validar campos requeridos
      const codigo = document.getElementById('codigo').value.trim();
      const descripcion = document.getElementById('descripcion').value.trim();
      const ubicacion = document.getElementById('ubicacion').value.trim();
      const estado = document.getElementById('estado').value;
      
      if (!codigo || !descripcion || !ubicacion || !estado) {
        showMessage('error', '⚠ Por favor completa todos los campos requeridos.');
        return;
      }
      
      // Preparar datos
      const usuario = document.getElementById('usuario').value.trim();
      const problema = document.getElementById('problema').value.trim();
      
      // Deshabilitar botón y mostrar estado
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner"></span> Enviando...';
      
      try {
        const formData = new FormData();
        formData.append('codigo', codigo);
        formData.append('descripcion', descripcion);
        formData.append('ubicacion', ubicacion);
        formData.append('usuario', usuario);
        formData.append('estado', estado);
        formData.append('problema', problema);
        
        const response = await fetch(SCRIPT_URL, {
          method: 'POST',
          body: formData,
          mode: 'no-cors'
        });
        
        // Con mode: 'no-cors', no obtenemos respuesta directa
        // Por lo que asumimos éxito después de 1 segundo
        setTimeout(() => {
          showMessage('success', `✓ ¡Equipo ${codigo} registrado exitosamente!`);
          form.reset();
          submitBtn.disabled = false;
          submitBtn.innerHTML = '✓ Registrar Equipo';
        }, 1000);
        
      } catch (error) {
        console.error('Error:', error);
        showMessage('error', '✗ Error al enviar el formulario. Intenta de nuevo.');
        submitBtn.disabled = false;
        submitBtn.innerHTML = '✓ Registrar Equipo';
      }
    });
  </script>
</body>
</html>
