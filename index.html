<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Inventario de TI - Distribuciones Universal</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --primary: #0066cc;
      --primary-light: #00a3ff;
      --primary-dark: #004499;
      --accent: #00d9ff;
      --bg: #f5f7fa;
      --surface: #ffffff;
      --surface-alt: #f9fafb;
      --border: #e5e7eb;
      --text: #1a202c;
      --text-muted: #64748b;
      --success: #10b981;
      --warning: #f59e0b;
      --error: #ef4444;
      --shadow: 0 4px 12px rgba(0, 102, 204, 0.08);
      --shadow-hover: 0 12px 24px rgba(0, 102, 204, 0.15);
    }
    
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    
    .navbar {
      background: var(--surface);
      border-bottom: 2px solid var(--border);
      padding: 1rem 2rem;
      box-shadow: var(--shadow);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    
    .navbar-content {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .logo {
      display: flex;
      align-items: center;
      gap: 1rem;
      text-decoration: none;
      color: var(--text);
    }
    
    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 1.2rem;
    }
    
    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }
    
    .logo-main {
      font-weight: 700;
      font-size: 1.3rem;
      color: var(--primary-dark);
      font-family: 'Poppins', sans-serif;
    }
    
    .logo-sub {
      font-size: 0.7rem;
      color: var(--text-muted);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .header-info {
      text-align: right;
      font-size: 0.9rem;
      color: var(--text-muted);
    }
    
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2.5rem 2rem;
    }
    
    .page-header {
      margin-bottom: 2rem;
    }
    
    .page-title {
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--primary-dark);
      margin-bottom: 0.5rem;
      font-family: 'Poppins', sans-serif;
    }
    
    .page-subtitle {
      color: var(--text-muted);
      font-size: 0.95rem;
    }
    
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1.2fr;
      gap: 2rem;
      margin-bottom: 2rem;
    }
    
    @media (max-width: 1024px) {
      .grid-2 { grid-template-columns: 1fr; }
    }
    
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
      box-shadow: var(--shadow);
      transition: all 0.3s ease;
    }
    
    .panel:hover {
      box-shadow: var(--shadow-hover);
    }
    
    .panel-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--primary-dark);
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
      font-family: 'Poppins', sans-serif;
    }
    
    .panel-title::before {
      content: '';
      width: 4px;
      height: 24px;
      background: linear-gradient(180deg, var(--primary), var(--primary-light));
      border-radius: 2px;
    }
    
    .form-group {
      margin-bottom: 1.3rem;
    }
    
    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    
    input, select, textarea {
      width: 100%;
      background: var(--surface-alt);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 0.9rem 1rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      transition: all 0.3s ease;
    }
    
    input:focus, select:focus, textarea:focus {
      border-color: var(--primary);
      background: #f0f7ff;
      box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.1);
      outline: none;
    }
    
    textarea {
      resize: vertical;
      min-height: 100px;
    }
    
    .button {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.95rem;
      letter-spacing: 0.3px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 0.5rem;
      box-shadow: 0 4px 12px rgba(0, 102, 204, 0.2);
    }
    
    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 102, 204, 0.3);
    }
    
    .button:active {
      transform: translateY(0);
    }
    
    .button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    
    .button-small {
      width: auto;
      padding: 0.7rem 1.5rem;
      font-size: 0.85rem;
      margin: 0;
    }
    
    .search-bar {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    
    .search-bar input {
      flex: 1;
    }
    
    .search-bar button {
      width: auto;
      padding: 0.9rem 1.8rem;
    }
    
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    
    .stat-box {
      background: linear-gradient(135deg, #f0f7ff 0%, #e0f0ff 100%);
      border: 2px solid var(--primary-light);
      padding: 1.3rem;
      border-radius: 10px;
      text-align: center;
      transition: all 0.3s ease;
    }
    
    .stat-box:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 16px rgba(0, 102, 204, 0.15);
    }
    
    .stat-number {
      font-size: 2rem;
      font-weight: 700;
      color: var(--primary-dark);
      margin-bottom: 0.3rem;
      font-family: 'Poppins', sans-serif;
    }
    
    .stat-label {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
    }
    
    .inventory-list {
      max-height: 600px;
      overflow-y: auto;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface-alt);
    }
    
    .inventory-item {
      padding: 1.3rem;
      border-bottom: 1px solid var(--border);
      transition: all 0.3s ease;
      cursor: pointer;
      position: relative;
    }
    
    .inventory-item:last-child {
      border-bottom: none;
    }
    
    .inventory-item:hover {
      background: #f0f7ff;
      transform: translateX(4px);
      border-left: 4px solid var(--primary);
      padding-left: calc(1.3rem - 4px);
    }
    
    .item-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.8rem;
    }
    
    .item-name {
      font-weight: 700;
      color: var(--primary-dark);
      font-size: 1.05rem;
    }
    
    .item-status {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 0.5rem 1rem;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .status-activo {
      background: rgba(16, 185, 129, 0.1);
      color: var(--success);
      border: 1px solid rgba(16, 185, 129, 0.3);
    }
    
    .status-problema {
      background: rgba(239, 68, 68, 0.1);
      color: var(--error);
      border: 1px solid rgba(239, 68, 68, 0.3);
    }
    
    .status-reparacion {
      background: rgba(245, 158, 11, 0.1);
      color: var(--warning);
      border: 1px solid rgba(245, 158, 11, 0.3);
    }
    
    .status-inactivo {
      background: rgba(100, 116, 139, 0.1);
      color: var(--text-muted);
      border: 1px solid rgba(100, 116, 139, 0.3);
    }
    
    .item-details {
      font-size: 0.85rem;
      color: var(--text-muted);
      line-height: 1.8;
    }
    
    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 0.3rem 0;
    }
    
    .detail-label {
      font-weight: 500;
      color: var(--text-muted);
    }
    
    .detail-value {
      color: var(--text);
      font-weight: 600;
      text-align: right;
    }
    
    .alert {
      padding: 1.2rem;
      border-radius: 8px;
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
      display: none;
      animation: slideDown 0.4s ease;
      border-left: 4px solid;
    }
    
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .alert.show {
      display: block;
    }
    
    .alert-success {
      background: rgba(16, 185, 129, 0.08);
      border-color: var(--success);
      color: var(--success);
    }
    
    .alert-error {
      background: rgba(239, 68, 68, 0.08);
      border-color: var(--error);
      color: var(--error);
    }
    
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    
    .modal.show {
      display: flex;
      animation: fadeIn 0.3s ease;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    .modal-content {
      background: var(--surface);
      border-radius: 12px;
      padding: 2rem;
      max-width: 500px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
      animation: modalSlide 0.3s ease;
    }
    
    @keyframes modalSlide {
      from { transform: scale(0.95); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    
    .modal-header {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--primary-dark);
      margin-bottom: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: 'Poppins', sans-serif;
    }
    
    .close-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1.8rem;
      cursor: pointer;
      padding: 0;
      width: auto;
      transition: color 0.3s ease;
    }
    
    .close-btn:hover {
      color: var(--primary);
    }
    
    .modal-details {
      line-height: 2.2;
      margin-bottom: 1.5rem;
    }
    
    .modal-details p {
      margin-bottom: 1rem;
      color: var(--text);
    }
    
    .modal-details strong {
      color: var(--primary-dark);
    }
    
    .modal-buttons {
      display: flex;
      gap: 1rem;
      margin-top: 1.5rem;
    }
    
    .modal-buttons button {
      flex: 1;
      padding: 0.8rem;
      font-size: 0.85rem;
    }
    
    .button-danger {
      background: linear-gradient(135deg, var(--error) 0%, #dc2626 100%);
      box-shadow: 0 4px 12px rgba(239, 68, 68, 0.2);
    }
    
    .button-danger:hover {
      box-shadow: 0 8px 20px rgba(239, 68, 68, 0.3);
    }
    
    .button-secondary {
      background: var(--surface-alt);
      color: var(--primary-dark);
      border: 2px solid var(--primary);
      box-shadow: none;
    }
    
    .button-secondary:hover {
      background: #f0f7ff;
      box-shadow: 0 4px 12px rgba(0, 102, 204, 0.1);
    }
    
    .sync-badge {
      display: inline-block;
      font-size: 0.75rem;
      padding: 0.4rem 0.8rem;
      background: rgba(16, 185, 129, 0.1);
      color: var(--success);
      border: 1px solid rgba(16, 185, 129, 0.3);
      border-radius: 12px;
      margin-left: 1rem;
      font-weight: 600;
    }
    
    @media (max-width: 768px) {
      .navbar-content {
        flex-direction: column;
        gap: 1rem;
      }
      
      .stats {
        grid-template-columns: 1fr;
      }
      
      .modal-buttons {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <!-- NAVBAR -->
  <div class="navbar">
    <div class="navbar-content">
      <a href="#" class="logo">
        <div class="logo-icon">DU</div>
        <div class="logo-text">
          <div class="logo-main">Distribuciones Universal</div>
          <div class="logo-sub">Inventario de TI</div>
        </div>
      </a>
      <div class="header-info">
        <div id="currentDate"></div>
      </div>
    </div>
  </div>
  
  <div class="container">
    <!-- PAGE HEADER -->
    <div class="page-header">
      <h1 class="page-title">Gestión de Inventario <span class="sync-badge" id="syncBadge">Local</span></h1>
      <p class="page-subtitle">Administración de computadores y equipos de tecnología</p>
    </div>
    
    <div id="alertContainer"></div>
    
    <!-- MAIN GRID -->
    <div class="grid-2">
      <!-- PANEL DE REGISTRO -->
      <div class="panel">
        <div class="panel-title">Registrar Nuevo Equipo</div>
        <form id="registroForm">
          <div class="form-group">
            <label>Código del Equipo *</label>
            <input type="text" id="codigo" placeholder="PC-001, LAPTOP-005" required>
          </div>
          <div class="form-group">
            <label>Descripción *</label>
            <input type="text" id="descripcion" placeholder="Dell OptiPlex 7090, Intel i7, 16GB RAM" required>
          </div>
          <div class="form-group">
            <label>Ubicación *</label>
            <input type="text" id="ubicacion" placeholder="Oficina 1, Escritorio A" required>
          </div>
          <div class="form-group">
            <label>Usuario Asignado</label>
            <input type="text" id="usuario" placeholder="Nombre del usuario">
          </div>
          <div class="form-group">
            <label>Estado del Equipo *</label>
            <select id="estado" required>
              <option value="">-- Seleccionar Estado --</option>
              <option value="activo">✓ Activo</option>
              <option value="problema">⚠ Problema Reportado</option>
              <option value="reparacion">🔧 En Reparación</option>
              <option value="inactivo">✗ Inactivo</option>
            </select>
          </div>
          <div class="form-group">
            <label>Descripción del Problema (opcional)</label>
            <textarea id="problema" placeholder="Describe el problema, síntomas o incidencia reportada..."></textarea>
          </div>
          <button type="submit" class="button" id="submitBtn">+ Registrar Equipo</button>
        </form>
      </div>
      
      <!-- PANEL DE BÚSQUEDA E INVENTARIO -->
      <div class="panel">
        <div class="panel-title">Equipos Registrados</div>
        
        <!-- ESTADÍSTICAS -->
        <div class="stats">
          <div class="stat-box">
            <div class="stat-number" id="totalCount">0</div>
            <div class="stat-label">Total Equipos</div>
          </div>
          <div class="stat-box">
            <div class="stat-number" id="activoCount">0</div>
            <div class="stat-label">Activos</div>
          </div>
          <div class="stat-box">
            <div class="stat-number" id="problemaCount">0</div>
            <div class="stat-label">Con Problemas</div>
          </div>
        </div>
        
        <!-- BÚSQUEDA -->
        <div class="search-bar">
          <input type="text" id="searchInput" placeholder="Buscar por código, descripción o usuario...">
          <button class="button button-small" id="searchBtn">🔍 Buscar</button>
        </div>
        
        <!-- LISTA DE INVENTARIO -->
        <div class="inventory-list" id="inventarioList">
          <div style="padding: 2rem; text-align: center; color: var(--text-muted);">
            📋 Sin registros aún. Comienza agregando tu primer equipo.
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <!-- MODAL DE DETALLES -->
  <div id="detailsModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <span id="modalTitle"></span>
        <button class="close-btn" onclick="closeModal()">×</button>
      </div>
      <div class="modal-details" id="modalBody"></div>
      <div class="modal-buttons">
        <button class="button button-secondary" onclick="closeModal()">Cerrar</button>
        <button class="button button-danger" id="deleteBtn">🗑 Eliminar</button>
      </div>
    </div>
  </div>
  
  <script>
    // ===== CONFIGURACIÓN DE GOOGLE SHEETS =====
    const SCRIPT_URL = 'https://script.google.com/macros/s/YOUR_SCRIPT_URL_HERE/usercontent'; // ← CAMBIAR CON TU URL
    const USE_GOOGLE_SHEETS = false; // Cambiar a true cuando tengas la URL configurada
    
    let equipos = JSON.parse(localStorage.getItem('equipos')) || [];
    let filteredEquipos = [];
    let currentEditIndex = -1;
    
    // Actualizar fecha actual
    function updateDate() {
      const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      const today = new Date().toLocaleDateString('es-ES', options);
      document.getElementById('currentDate').textContent = today;
    }
    
    function showAlert(message, type = 'success') {
      const container = document.getElementById('alertContainer');
      const alert = document.createElement('div');
      alert.className = `alert alert-${type} show`;
      alert.textContent = message;
      container.innerHTML = '';
      container.appendChild(alert);
      setTimeout(() => alert.classList.remove('show'), 4000);
    }
    
    function saveToLocalStorage() {
      localStorage.setItem('equipos', JSON.stringify(equipos));
    }
    
    async function saveToGoogleSheets(equipo) {
      if (!USE_GOOGLE_SHEETS) return;
      
      try {
        const formData = new FormData();
        formData.append('codigo', equipo.codigo);
        formData.append('descripcion', equipo.descripcion);
        formData.append('ubicacion', equipo.ubicacion);
        formData.append('usuario', equipo.usuario);
        formData.append('estado', equipo.estado);
        formData.append('problema', equipo.problema);
        
        await fetch(SCRIPT_URL, {
          method: 'POST',
          body: formData,
          mode: 'no-cors'
        });
        
        return true;
      } catch (error) {
        console.error('Error sincronizando con Google Sheets:', error);
        return false;
      }
    }
    
    function updateStats() {
      const total = equipos.length;
      const activos = equipos.filter(e => e.estado === 'activo').length;
      const problemas = equipos.filter(e => e.estado === 'problema').length;
      
      document.getElementById('totalCount').textContent = total;
      document.getElementById('activoCount').textContent = activos;
      document.getElementById('problemaCount').textContent = problemas;
    }
    
    function renderInventario(items = equipos) {
      const list = document.getElementById('inventarioList');
      if (items.length === 0) {
        list.innerHTML = '<div style="padding: 2rem; text-align: center; color: var(--text-muted);">📋 Sin resultados...</div>';
        return;
      }
      
      list.innerHTML = items.map((item, index) => {
        const realIndex = equipos.indexOf(item);
        return `
          <div class="inventory-item" onclick="showDetails(${realIndex})">
            <div class="item-header">
              <div class="item-name">${item.codigo}</div>
              <div class="item-status status-${item.estado}">${item.estado.toUpperCase()}</div>
            </div>
            <div class="item-details">
              <div class="detail-row">
                <span class="detail-label">Equipo:</span>
                <span class="detail-value">${item.descripcion}</span>
              </div>
              <div class="detail-row">
                <span class="detail-label">Ubicación:</span>
                <span class="detail-value">${item.ubicacion}</span>
              </div>
              <div class="detail-row">
                <span class="detail-label">Usuario:</span>
                <span class="detail-value">${item.usuario || 'Sin asignar'}</span>
              </div>
              ${item.problema ? `<div class="detail-row" style="color: var(--error); margin-top: 0.5rem;"><span class="detail-label">⚠ Problema:</span><span class="detail-value">${item.problema.substring(0, 40)}...</span></div>` : ''}
            </div>
          </div>
        `;
      }).join('');
    }
    
    function showDetails(index) {
      currentEditIndex = index;
      const equipo = equipos[index];
      const modal = document.getElementById('detailsModal');
      document.getElementById('modalTitle').textContent = equipo.codigo;
      
      const fechaFormato = new Date(equipo.fecha).toLocaleDateString('es-ES', { 
        year: 'numeric', 
        month: 'long', 
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
      
      document.getElementById('modalBody').innerHTML = `
        <p>
          <strong>Descripción:</strong><br>
          ${equipo.descripcion}
        </p>
        <p>
          <strong>Ubicación:</strong><br>
          ${equipo.ubicacion}
        </p>
        <p>
          <strong>Usuario Asignado:</strong><br>
          ${equipo.usuario || 'Sin asignar'}
        </p>
        <p>
          <strong>Estado:</strong><br>
          <span class="item-status status-${equipo.estado}">${equipo.estado.toUpperCase()}</span>
        </p>
        ${equipo.problema ? `
          <p>
            <strong style="color: var(--error);">⚠ Problema Reportado:</strong><br>
            ${equipo.problema}
          </p>
        ` : ''}
        <p style="font-size: 0.85rem; color: var(--text-muted); margin-top: 1rem; border-top: 1px solid var(--border); padding-top: 1rem;">
          📅 Registrado el ${fechaFormato}
        </p>
      `;
      
      document.getElementById('deleteBtn').onclick = () => {
        if (confirm(`¿Confirmas que deseas eliminar el equipo ${equipo.codigo}?`)) {
          equipos.splice(index, 1);
          saveToLocalStorage();
          updateStats();
          renderInventario();
          closeModal();
          showAlert(`✓ Equipo ${equipo.codigo} eliminado correctamente`, 'success');
        }
      };
      
      modal.classList.add('show');
    }
    
    function closeModal() {
      document.getElementById('detailsModal').classList.remove('show');
      currentEditIndex = -1;
    }
    
    // EVENTOS DE FORMULARIO
    document.getElementById('registroForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const codigo = document.getElementById('codigo').value.trim();
      const estado = document.getElementById('estado').value;
      const btn = document.getElementById('submitBtn');
      
      if (!codigo || !estado) {
        showAlert('⚠ Por favor completa todos los campos requeridos', 'error');
        return;
      }
      
      if (equipos.some(e => e.codigo === codigo)) {
        showAlert('⚠ Este código de equipo ya existe en el inventario', 'error');
        return;
      }
      
      const nuevoEquipo = {
        codigo: codigo,
        descripcion: document.getElementById('descripcion').value.trim(),
        ubicacion: document.getElementById('ubicacion').value.trim(),
        usuario: document.getElementById('usuario').value.trim(),
        estado: estado,
        problema: document.getElementById('problema').value.trim(),
        fecha: new Date().toISOString()
      };
      
      // Mostrar estado de envío
      btn.disabled = true;
      btn.textContent = '⏳ Guardando...';
      
      // Guardar en localStorage
      equipos.push(nuevoEquipo);
      saveToLocalStorage();
      
      // Intentar sincronizar con Google Sheets si está habilitado
      if (USE_GOOGLE_SHEETS) {
        const synced = await saveToGoogleSheets(nuevoEquipo);
        if (synced) {
          showAlert(`✓ Equipo ${codigo} registrado y sincronizado con Google Sheets`, 'success');
          document.getElementById('syncBadge').textContent = '✓ Sincronizado';
          document.getElementById('syncBadge').style.background = 'rgba(16, 185, 129, 0.1)';
        } else {
          showAlert(`✓ Equipo ${codigo} registrado localmente (fallo al sincronizar)`, 'success');
        }
      } else {
        showAlert(`✓ Equipo ${codigo} registrado en el inventario`, 'success');
      }
      
      updateStats();
      renderInventario();
      document.getElementById('registroForm').reset();
      
      // Restaurar botón
      btn.disabled = false;
      btn.textContent = '+ Registrar Equipo';
    });
    
    // BÚSQUEDA
    document.getElementById('searchBtn').addEventListener('click', () => {
      const query = document.getElementById('searchInput').value.toLowerCase();
      if (!query) {
        filteredEquipos = equipos;
      } else {
        filteredEquipos = equipos.filter(e => 
          e.codigo.toLowerCase().includes(query) ||
          e.descripcion.toLowerCase().includes(query) ||
          e.usuario.toLowerCase().includes(query)
        );
      }
      renderInventario(filteredEquipos);
    });
    
    document.getElementById('searchInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') document.getElementById('searchBtn').click();
    });
    
    // Inicializar
    updateDate();
    updateStats();
    renderInventario();
  </script>
</body>
</html>
